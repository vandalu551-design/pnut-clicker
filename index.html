<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PNUT Clicker — Fix the Printer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0f1e 0%, #0f1722 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 16px;
        }

        .game-container {
            max-width: 500px;
            margin: 0 auto;
        }

        /* Кнопка подключения кошелька */
        .wallet-circle {
            width: 44px;
            height: 44px;
            background: #3b82f6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            margin: 0 auto 12px auto;
            position: relative;
        }

        .wallet-circle:active {
            transform: scale(0.95);
        }

        .wallet-circle svg {
            width: 24px;
            height: 24px;
            stroke: white;
            stroke-width: 2;
            fill: none;
        }

        /* Меню отключения кошелька */
        .disconnect-menu {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: #151e2c;
            border-radius: 12px;
            padding: 8px 0;
            min-width: 140px;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 1px solid #2a3a4a;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s, visibility 0.2s;
        }

        .disconnect-menu.show {
            opacity: 1;
            visibility: visible;
        }

        .disconnect-menu button {
            width: 100%;
            background: none;
            border: none;
            padding: 10px 16px;
            color: #ff4444;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            transition: background 0.2s;
        }

        .disconnect-menu button:hover {
            background: #1e2a3a;
        }

        /* Баланс */
        .balance-section {
            text-align: center;
            margin-bottom: 20px;
        }

        .balance-label {
            font-size: 12px;
            color: #8aa0b5;
        }

        .balance-value {
            font-size: 28px;
            font-weight: bold;
            color: #f5c542;
        }

        /* Остальные стили (принтер, бустеры и т.д.) без изменений */
        .printer-container {
            background: #151e2c;
            border-radius: 30px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #2a3a4a;
        }

        .printer {
            cursor: pointer;
            margin-bottom: 20px;
            position: relative;
        }

        .printer-3d {
            background: #2c3e4e;
            border-radius: 20px;
            padding: 20px 15px;
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
            border-bottom: 3px solid #1a2a3a;
        }

        .printer-top {
            background: #34495e;
            border-radius: 15px 15px 5px 5px;
            padding: 10px;
            margin: -25px -15px 15px -15px;
            position: relative;
            border-bottom: 2px solid #2c3e4e;
        }

        .printer-top .handle {
            width: 40px;
            height: 6px;
            background: #5d6e7e;
            border-radius: 3px;
            margin: 0 auto;
        }

        .printer-screen {
            background: #0a0f1e;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #1e2a3a;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .error-message {
            font-family: monospace;
            color: #ff4444;
            font-size: 12px;
            margin-bottom: 8px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .progress-bar-container {
            background: #1e2a3a;
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
        }

        .progress-bar {
            background: linear-gradient(90deg, #f5c542, #d4a017);
            width: 0%;
            height: 100%;
            transition: width 0.3s;
        }

        .printer-buttons-panel {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 15px;
        }

        .printer-btn {
            width: 35px;
            height: 35px;
            background: #1e2a3a;
            border-radius: 50%;
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.1), 0 2px 4px rgba(0,0,0,0.3);
        }

        .printer-btn.red {
            background: #c0392b;
        }

        .printer-btn.green {
            background: #27ae60;
        }

        .paper-tray {
            background: #5d6e7e;
            border-radius: 5px;
            padding: 8px;
            margin-bottom: 15px;
        }

        .paper-stack {
            background: #e0e0e0;
            height: 15px;
            width: 80%;
            margin: 0 auto;
            border-radius: 3px;
            position: relative;
        }

        .paper-stack::before {
            content: '';
            position: absolute;
            top: -3px;
            left: 0;
            width: 100%;
            height: 3px;
            background: #f0f0f0;
            border-radius: 2px;
        }

        .paper-output {
            background: #e0e0e0;
            height: 8px;
            width: 70%;
            margin: -10px auto 10px auto;
            border-radius: 4px 4px 0 0;
            position: relative;
            z-index: 1;
        }

        .peanut-shells {
            margin-top: 15px;
            font-size: 28px;
            letter-spacing: 10px;
            min-height: 55px;
        }

        .click-counter {
            font-size: 16px;
            color: #8aa0b5;
            margin-bottom: 15px;
        }

        .click-btn {
            background: linear-gradient(135deg, #f5c542 0%, #d4a017 100%);
            color: #0a0f1e;
            border: none;
            padding: 16px 30px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: transform 0.1s;
        }

        .click-btn:active {
            transform: scale(0.98);
        }

        .boosters {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .booster {
            background: #151e2c;
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            border: 1px solid #2a3a4a;
            cursor: pointer;
            transition: all 0.2s;
        }

        .booster:active {
            transform: scale(0.96);
        }

        .booster-icon {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .booster-name {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .booster-cost {
            font-size: 10px;
            color: #f5c542;
        }

        .referral-section {
            background: #151e2c;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid #2a3a4a;
        }

        .referral-title {
            font-size: 14px;
            margin-bottom: 10px;
            text-align: center;
        }

        .referral-link-container {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .referral-link-container input {
            flex: 1;
            background: #0a0f1e;
            border: 1px solid #2a3a4a;
            border-radius: 8px;
            padding: 8px;
            color: #e0e0e0;
            font-size: 12px;
        }

        .copy-btn {
            background: #f5c542;
            color: #0a0f1e;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .referral-stats {
            font-size: 12px;
            color: #8aa0b5;
            text-align: center;
        }

        .leaderboard {
            background: #151e2c;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid #2a3a4a;
        }

        .leaderboard-title {
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 12px;
        }

        .leaderboard-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #2a3a4a;
            font-size: 12px;
        }

        .leaderboard-rank {
            color: #f5c542;
            font-weight: bold;
        }

        .achievements {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .achievement {
            background: #151e2c;
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            border: 1px solid #2a3a4a;
            opacity: 0.5;
            transition: all 0.2s;
        }

        .achievement.unlocked {
            opacity: 1;
            border-color: #f5c542;
        }

        .achievement-icon {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .achievement-name {
            font-size: 10px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .achievement-progress {
            font-size: 9px;
            color: #8aa0b5;
        }

        @keyframes clickFlash {
            0% { transform: scale(1); }
            50% { transform: scale(0.98); filter: brightness(1.1); }
            100% { transform: scale(1); }
        }

        .printer-clicked {
            animation: clickFlash 0.1s ease-out;
        }

        @keyframes shellPop {
            0% { transform: scale(0) rotate(0deg); opacity: 0; }
            50% { transform: scale(1.3) rotate(180deg); opacity: 1; }
            100% { transform: scale(1) rotate(360deg); opacity: 1; }
        }

        .shell-pop {
            animation: shellPop 0.4s ease-out;
            display: inline-block;
        }

        @keyframes smokeFloat {
            0% { opacity: 0; transform: translateY(0) scale(0.8); }
            30% { opacity: 0.8; transform: translateY(-10px) scale(1.1); }
            100% { opacity: 0; transform: translateY(-40px) scale(1.5); }
        }

        .smoke-particle {
            position: absolute;
            font-size: 24px;
            pointer-events: none;
            animation: smokeFloat 0.6s ease-out forwards;
        }

        @keyframes spark {
            0% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0); }
        }

        .spark {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #ffaa00;
            border-radius: 50%;
            pointer-events: none;
            animation: spark 0.3s ease-out forwards;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-3px); }
            75% { transform: translateX(3px); }
        }

        .printer-shake {
            animation: shake 0.1s ease-in-out 3;
        }

        .captcha-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .captcha-window {
            background: #151e2c;
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            border: 1px solid #f5c542;
            max-width: 280px;
            width: 90%;
        }

        .captcha-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .captcha-window p {
            margin-bottom: 20px;
            color: #e0e0e0;
            font-size: 16px;
        }

        .captcha-buttons {
            display: flex;
            justify-content: center;
        }

        .captcha-confirm {
            background: #f5c542;
            color: #0a0f1e;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }

        .captcha-timeout {
            margin-top: 16px;
            font-size: 12px;
            color: #8aa0b5;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #f5c542;
            color: #0a0f1e;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            z-index: 1000;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- Кнопка подключения кошелька -->
        <div id="wallet-circle" class="wallet-circle" style="position: relative;">
            <svg viewBox="0 0 24 24" stroke="white" stroke-width="2" fill="none">
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="8" x2="12" y2="16" />
                <line x1="8" y1="12" x2="16" y2="12" />
            </svg>
            <div id="disconnect-menu" class="disconnect-menu">
                <button id="disconnect-btn">🔌 Disconnect Wallet</button>
            </div>
        </div>

        <!-- Баланс -->
        <div class="balance-section">
            <div class="balance-label">Your $PNUT</div>
            <div class="balance-value" id="pnut-balance">0</div>
        </div>

        <!-- Принтер -->
        <div class="printer-container">
            <div class="printer" id="printer">
                <div class="paper-output"></div>
                <div class="printer-3d">
                    <div class="printer-top">
                        <div class="handle"></div>
                    </div>
                    <div class="printer-screen">
                        <div class="error-message" id="error-message">PAPER JAM</div>
                        <div class="progress-bar-container">
                            <div class="progress-bar" id="progress-bar"></div>
                        </div>
                    </div>
                    <div class="printer-buttons-panel">
                        <div class="printer-btn"></div>
                        <div class="printer-btn green"></div>
                        <div class="printer-btn red"></div>
                        <div class="printer-btn"></div>
                    </div>
                    <div class="paper-tray">
                        <div class="paper-stack"></div>
                    </div>
                </div>
                <div class="peanut-shells" id="peanut-shells"></div>
            </div>
            <div class="click-counter">
                <span id="click-count">0</span> clicks
            </div>
            <button id="click-btn" class="click-btn">🔨 FIX THE PRINTER</button>
        </div>

        <div class="boosters">
            <div class="booster" data-booster="double">
                <div class="booster-icon">⚡</div>
                <div class="booster-name">Double Click</div>
                <div class="booster-cost">50 $PNUT</div>
            </div>
            <div class="booster" data-booster="auto">
                <div class="booster-icon">🤖</div>
                <div class="booster-name">Auto Clicker</div>
                <div class="booster-cost">200 $PNUT</div>
            </div>
            <div class="booster" data-booster="peanut">
                <div class="booster-icon">🥜</div>
                <div class="booster-name">Peanut Rain</div>
                <div class="booster-cost">500 $PNUT</div>
            </div>
        </div>

        <div class="referral-section">
            <div class="referral-title">👥 Invite friends, earn more</div>
            <div class="referral-link-container">
                <input type="text" id="referral-link" readonly>
                <button id="copy-link" class="copy-btn">Copy</button>
            </div>
            <div class="referral-stats">
                Referrals: <span id="referral-count">0</span> | Bonus: <span id="referral-bonus">0</span> $PNUT
            </div>
        </div>

        <div class="leaderboard">
            <div class="leaderboard-title">🏆 Top Clickers 🏆</div>
            <div id="leaderboard-list" class="leaderboard-list">
                <div class="leaderboard-loading">No data yet</div>
            </div>
        </div>

        <div class="achievements">
            <div class="achievement" data-achievement="100">
                <div class="achievement-icon">🔧</div>
                <div class="achievement-name">Beginner Fixer</div>
                <div class="achievement-progress">0/100</div>
            </div>
            <div class="achievement" data-achievement="1000">
                <div class="achievement-icon">⚙️</div>
                <div class="achievement-name">Printer Expert</div>
                <div class="achievement-progress">0/1000</div>
            </div>
            <div class="achievement" data-achievement="10000">
                <div class="achievement-icon">🏭</div>
                <div class="achievement-name">Factory Owner</div>
                <div class="achievement-progress">0/10000</div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script>
        // ========== Игровые переменные ==========
        let clicks = 0;
        let pnutBalance = 0;
        let clickMultiplier = 1;
        let autoClickerActive = false;
        let autoClickerInterval = null;
        let walletAddress = null;

        // ========== Защита от накрутки ==========
        let lastClickTime = 0;
        const CLICK_COOLDOWN = 200;
        let clicksSinceCaptcha = 0;
        const CAPTCHA_INTERVAL = 100;
        let captchaActive = false;
        let pendingClicks = 0;

        // DOM элементы
        const walletCircle = document.getElementById('wallet-circle');
        const disconnectMenu = document.getElementById('disconnect-menu');

        // Загрузка сохранённых данных
        function loadGameData() {
            const saved = localStorage.getItem('pnutClickerData');
            if (saved) {
                const data = JSON.parse(saved);
                clicks = data.clicks || 0;
                pnutBalance = data.pnutBalance || 0;
                clickMultiplier = data.clickMultiplier || 1;
                if (data.autoClickerActive) {
                    activateAutoClicker();
                }
            }
            updateUI();
            checkAchievements();
        }

        function saveGameData() {
            const data = {
                clicks: clicks,
                pnutBalance: pnutBalance,
                clickMultiplier: clickMultiplier,
                autoClickerActive: autoClickerActive
            };
            localStorage.setItem('pnutClickerData', JSON.stringify(data));
        }

        // ========== TON Connect ==========
        let tonConnectUI = null;

        function initTonConnect() {
            if (typeof TON_CONNECT_UI === 'undefined') {
                console.log('TON Connect UI not loaded yet');
                setTimeout(initTonConnect, 500);
                return;
            }
            
            tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
                manifestUrl: 'https://fedpostnut.com/tonconnect-manifest.json',
                buttonRootId: 'wallet-circle'
            });
            
            tonConnectUI.onStatusChange(async (wallet) => {
                if (wallet) {
                    walletAddress = wallet.account.address;
                    if (walletCircle) {
                        walletCircle.style.background = '#10b981';
                        walletCircle.innerHTML = `
                            <svg viewBox="0 0 24 24" stroke="white" stroke-width="2" fill="none">
                                <path d="M20 6L9 17L4 12" stroke="white" stroke-width="2" fill="none"/>
                            </svg>
                        `;
                    }
                    await fetchRealBalance();
                } else {
                    walletAddress = null;
                    if (walletCircle) {
                        walletCircle.style.background = '#3b82f6';
                        walletCircle.innerHTML = `
                            <svg viewBox="0 0 24 24" stroke="white" stroke-width="2" fill="none">
                                <circle cx="12" cy="12" r="10" />
                                <line x1="12" y1="8" x2="12" y2="16" />
                                <line x1="8" y1="12" x2="16" y2="12" />
                            </svg>
                        `;
                    }
                }
                // Скрываем меню при изменении статуса
                if (disconnectMenu) {
                    disconnectMenu.classList.remove('show');
                }
            });
        }

        async function fetchRealBalance() {
            if (!walletAddress) return;
            console.log('Fetching real balance for', walletAddress);
        }

        // Отключение кошелька
        function disconnectWallet() {
            if (tonConnectUI) {
                tonConnectUI.disconnect();
            }
            if (disconnectMenu) {
                disconnectMenu.classList.remove('show');
            }
            showToast('🔌 Wallet disconnected');
        }

        // ========== Эффекты ==========
        function createSmoke(x, y) {
            const smoke = document.createElement('div');
            smoke.className = 'smoke-particle';
            smoke.textContent = '💨';
            smoke.style.left = x + 'px';
            smoke.style.top = y + 'px';
            document.body.appendChild(smoke);
            setTimeout(() => smoke.remove(), 600);
        }

        function createSpark(x, y) {
            const spark = document.createElement('div');
            spark.className = 'spark';
            spark.style.left = x + 'px';
            spark.style.top = y + 'px';
            document.body.appendChild(spark);
            setTimeout(() => spark.remove(), 300);
        }

        function shakePrinter() {
            const printer = document.getElementById('printer');
            if (printer) {
                printer.classList.add('printer-shake');
                setTimeout(() => printer.classList.remove('printer-shake'), 300);
            }
        }

        // ========== Процессинг клика ==========
        function processClick() {
            const earnAmount = 0.1 * clickMultiplier;
            pnutBalance += earnAmount;
            clicks++;
            
            const printer = document.getElementById('printer');
            if (printer) {
                printer.classList.add('printer-clicked');
                setTimeout(() => printer.classList.remove('printer-clicked'), 100);
            }
            
            shakePrinter();
            
            if (clicks % 10 === 0) {
                for (let i = 0; i < 3; i++) {
                    setTimeout(() => {
                        const rect = printer?.getBoundingClientRect();
                        if (rect) {
                            createSpark(rect.left + Math.random() * rect.width, rect.top + Math.random() * rect.height);
                        }
                    }, i * 50);
                }
            }
            
            const shells = document.getElementById('peanut-shells');
            if (shells) {
                shells.innerHTML = '🥜';
                shells.classList.add('shell-pop');
                setTimeout(() => {
                    shells.innerHTML = '';
                    shells.classList.remove('shell-pop');
                }, 400);
            }
            
            const printerRect = printer?.getBoundingClientRect();
            if (printerRect) {
                createSmoke(printerRect.left + printerRect.width / 2, printerRect.top + 20);
            }
            
            const progress = (clicks % 1000) / 10;
            const progressBar = document.getElementById('progress-bar');
            if (progressBar) {
                progressBar.style.width = `${progress}%`;
            }
            
            const errorMsg = document.getElementById('error-message');
            if (errorMsg) {
                if (clicks % 1000 === 0 && clicks > 0) {
                    errorMsg.textContent = 'FIXED!';
                    errorMsg.style.color = '#27ae60';
                    setTimeout(() => {
                        errorMsg.textContent = 'PAPER JAM';
                        errorMsg.style.color = '#ff4444';
                    }, 2000);
                } else if (progress > 50) {
                    errorMsg.textContent = 'ALMOST FIXED...';
                } else {
                    errorMsg.textContent = 'PAPER JAM';
                }
            }
            
            updateUI();
            saveGameData();
            checkAchievements();
            
            if (walletAddress) {
                updateLeaderboard();
            }
        }

        function handleClick(event) {
            if (event && event.detail === 0 && !event.isTrusted) {
                console.log('Bot detected');
                showToast('🤖 Bot detected! Click blocked.');
                return;
            }
            
            const now = Date.now();
            if (now - lastClickTime < CLICK_COOLDOWN) {
                showToast('⏱️ Too fast! Slow down.');
                return;
            }
            lastClickTime = now;
            
            if (captchaActive) {
                pendingClicks++;
                showToast('🔒 Captcha active. Click queued.');
                return;
            }
            
            clicksSinceCaptcha++;
            
            if (clicksSinceCaptcha >= CAPTCHA_INTERVAL) {
                showCaptcha();
                return;
            }
            
            processClick();
        }

        function activateAutoClicker() {
            if (autoClickerInterval) return;
            autoClickerActive = true;
            autoClickerInterval = setInterval(() => {
                const now = Date.now();
                if (!captchaActive && (now - lastClickTime >= CLICK_COOLDOWN)) {
                    lastClickTime = now;
                    processClick();
                }
            }, 1100);
            showToast('🤖 Auto Clicker activated!');
        }

        function stopAutoClicker() {
            if (autoClickerInterval) {
                clearInterval(autoClickerInterval);
                autoClickerInterval = null;
            }
            autoClickerActive = false;
        }

        // ========== Бустеры ==========
        function buyBooster(type) {
            if (type === 'double' && clickMultiplier === 1 && pnutBalance >= 50) {
                pnutBalance -= 50;
                clickMultiplier = 2;
                showToast('⚡ Double Click activated!');
                updateUI();
                saveGameData();
            } else if (type === 'auto' && !autoClickerActive && pnutBalance >= 200) {
                pnutBalance -= 200;
                activateAutoClicker();
                updateUI();
                saveGameData();
            } else if (type === 'peanut' && pnutBalance >= 500) {
                pnutBalance -= 500;
                showToast('🥜 Peanut Rain! +50 clicks incoming...');
                let clicksAdded = 0;
                const addClickWithDelay = () => {
                    if (clicksAdded < 50 && !captchaActive) {
                        processClick();
                        clicksAdded++;
                        setTimeout(addClickWithDelay, 50);
                    } else if (clicksAdded < 50 && captchaActive) {
                        setTimeout(addClickWithDelay, 200);
                    } else {
                        showToast('✅ Peanut Rain complete!');
                    }
                };
                addClickWithDelay();
                updateUI();
                saveGameData();
            } else {
                showToast('❌ Not enough $PNUT');
            }
        }

        function updateUI() {
            const clickCountEl = document.getElementById('click-count');
            const balanceEl = document.getElementById('pnut-balance');
            if (clickCountEl) clickCountEl.textContent = clicks;
            if (balanceEl) balanceEl.textContent = pnutBalance.toFixed(1);
        }

        function checkAchievements() {
            const achievements = { 100: 'Beginner Fixer', 1000: 'Printer Expert', 10000: 'Factory Owner' };
            for (const [target, name] of Object.entries(achievements)) {
                const achievementDiv = document.querySelector(`[data-achievement="${target}"]`);
                if (achievementDiv) {
                    if (clicks >= target && !achievementDiv.classList.contains('unlocked')) {
                        achievementDiv.classList.add('unlocked');
                        showToast(`🏆 Achievement unlocked: ${name}!`);
                    }
                    const progressSpan = achievementDiv.querySelector('.achievement-progress');
                    if (progressSpan) {
                        progressSpan.textContent = `${Math.min(clicks, target)}/${target}`;
                    }
                }
            }
        }

        function initReferral() {
            const urlParams = new URLSearchParams(window.location.search);
            const referrer = urlParams.get('ref');
            
            if (referrer && !localStorage.getItem('referred')) {
                localStorage.setItem('referred', 'true');
                console.log('Referred by:', referrer);
                showToast('🎉 Welcome! You were referred!');
            }
            
            const currentUrl = window.location.href.split('?')[0];
            let userId = localStorage.getItem('userId');
            if (!userId) {
                userId = Math.random().toString(36).substring(2, 10);
                localStorage.setItem('userId', userId);
            }
            
            const referralLink = `${currentUrl}?ref=${userId}`;
            const referralInput = document.getElementById('referral-link');
            if (referralInput) referralInput.value = referralLink;
            
            const referrals = JSON.parse(localStorage.getItem('referrals') || '[]');
            const referralCountEl = document.getElementById('referral-count');
            const referralBonusEl = document.getElementById('referral-bonus');
            if (referralCountEl) referralCountEl.textContent = referrals.length;
            if (referralBonusEl) referralBonusEl.textContent = referrals.length * 10;
        }

        function updateLeaderboard() {
            if (!walletAddress) return;
            
            let leaderboard = JSON.parse(localStorage.getItem('pnutLeaderboard') || '[]');
            const existing = leaderboard.find(entry => entry.wallet === walletAddress);
            
            if (existing) {
                existing.clicks = clicks;
                existing.balance = pnutBalance;
            } else {
                leaderboard.push({ wallet: walletAddress, clicks: clicks, balance: pnutBalance, date: new Date().toISOString() });
            }
            
            leaderboard.sort((a, b) => b.clicks - a.clicks);
            const topLeaderboard = leaderboard.slice(0, 20);
            localStorage.setItem('pnutLeaderboard', JSON.stringify(topLeaderboard));
            renderLeaderboard(topLeaderboard);
        }

        function renderLeaderboard(leaderboard) {
            const container = document.getElementById('leaderboard-list');
            if (!container) return;
            if (leaderboard.length === 0) { container.innerHTML = '<div class="leaderboard-loading">No data yet</div>'; return; }
            container.innerHTML = leaderboard.map((entry, index) => `
                <div class="leaderboard-item">
                    <span class="leaderboard-rank">#${index + 1}</span>
                    <span>${entry.wallet.slice(0, 6)}...${entry.wallet.slice(-4)}</span>
                    <span>${entry.clicks} clicks</span>
                </div>
            `).join('');
        }

        // ========== Капча ==========
        function showCaptcha() {
            if (captchaActive) return;
            captchaActive = true;
            
            let wasAutoClickerActive = autoClickerActive;
            if (autoClickerActive) {
                stopAutoClicker();
            }
            
            const captchaDiv = document.createElement('div');
            captchaDiv.className = 'captcha-overlay';
            captchaDiv.innerHTML = `
                <div class="captcha-window">
                    <div class="captcha-icon">🔧</div>
                    <p>Prove you're not a bot</p>
                    <div class="captcha-buttons">
                        <button id="captcha-btn" class="captcha-confirm">I'm human</button>
                    </div>
                    <div class="captcha-timeout" id="captcha-timeout">⏱️ 10 seconds</div>
                </div>
            `;
            document.body.appendChild(captchaDiv);
            
            let timeLeft = 10;
            const timeoutDisplay = document.getElementById('captcha-timeout');
            
            const timer = setInterval(() => {
                timeLeft--;
                if (timeoutDisplay) {
                    timeoutDisplay.textContent = `⏱️ ${timeLeft} seconds`;
                }
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    if (captchaDiv && captchaDiv.parentNode) {
                        captchaDiv.remove();
                    }
                    captchaActive = false;
                    showToast('❌ Captcha timeout! Clicks reset.');
                    clicksSinceCaptcha = 0;
                    pendingClicks = 0;
                    if (wasAutoClickerActive) {
                        activateAutoClicker();
                    }
                }
            }, 1000);
            
            const btn = document.getElementById('captcha-btn');
            btn.onclick = () => {
                clearInterval(timer);
                captchaDiv.remove();
                captchaActive = false;
                clicksSinceCaptcha = 0;
                showToast('✅ Human verified!');
                
                if (pendingClicks > 0) {
                    showToast(`📦 Processing ${pendingClicks} pending clicks...`);
                    for (let i = 0; i < pendingClicks; i++) {
                        processClick();
                    }
                    pendingClicks = 0;
                }
                
                if (wasAutoClickerActive) {
                    activateAutoClicker();
                }
            };
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        // ========== Обработчики меню ==========
        if (walletCircle) {
            walletCircle.addEventListener('click', (e) => {
                e.stopPropagation();
                if (walletAddress && disconnectMenu) {
                    disconnectMenu.classList.toggle('show');
                } else if (tonConnectUI && !walletAddress) {
                    tonConnectUI.openModal();
                }
            });
        }

        document.addEventListener('click', () => {
            if (disconnectMenu) {
                disconnectMenu.classList.remove('show');
            }
        });

        if (disconnectMenu) {
            const disconnectBtn = document.getElementById('disconnect-btn');
            if (disconnectBtn) {
                disconnectBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    disconnectWallet();
                });
            }
        }

        function init() {
            loadGameData();
            initTonConnect();
            initReferral();
            
            const clickBtn = document.getElementById('click-btn');
            if (clickBtn) clickBtn.addEventListener('click', handleClick);
            
            document.querySelectorAll('.booster').forEach(booster => {
                booster.addEventListener('click', () => buyBooster(booster.dataset.booster));
            });
            
            const copyBtn = document.getElementById('copy-link');
            if (copyBtn) {
                copyBtn.addEventListener('click', () => {
                    const linkInput = document.getElementById('referral-link');
                    if (linkInput) {
                        linkInput.select();
                        document.execCommand('copy');
                        showToast('✅ Link copied!');
                    }
                });
            }
            
            const savedLeaderboard = JSON.parse(localStorage.getItem('pnutLeaderboard') || '[]');
            renderLeaderboard(savedLeaderboard);
        }

        init();
    </script>
</body>
</html>
